# ============================================================
# Oozie Job Properties
# Chạy pipeline: oozie job -config job.properties -run
# ============================================================

# Địa chỉ Oozie server (HDP 2.6.5 mặc định)
oozie.url=http://localhost:11000/oozie

# HDFS NameNode và YARN ResourceManager
nameNode=hdfs://localhost:8020
jobTracker=localhost:8050

# Thư mục chứa workflow trên HDFS
oozie.wf.application.path=${nameNode}/user/oozie/social_analytics

# Thư mục dữ liệu
dataDir=${nameNode}/user/social_analytics/raw
outputDir=${nameNode}/user/social_analytics/processed

# MySQL connection (cho Sqoop)
mysqlHost=localhost
mysqlDB=social_db
mysqlUser=root
mysqlPassword=hadoop

# Queue YARN
mapreduce.job.queuename=default
