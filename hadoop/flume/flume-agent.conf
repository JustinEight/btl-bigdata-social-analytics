# ============================================================
# Flume Agent Configuration
# Thu thập dữ liệu log từ file và đẩy vào HDFS
#
# Khởi động: flume-ng agent \
#   --conf /etc/flume/conf \
#   --conf-file flume-agent.conf \
#   --name social_agent \
#   -Dflume.root.logger=INFO,console
# ============================================================

# ── Khai báo các thành phần của agent ────────────────────────
social_agent.sources  = twitter_source reddit_source
social_agent.channels = mem_channel file_channel
social_agent.sinks    = hdfs_sink_tweets hdfs_sink_reddit

# ── SOURCE 1: Thu thập tweets từ thư mục spool ───────────────
# Flume theo dõi thư mục, khi có file mới → đọc và gửi đi
social_agent.sources.twitter_source.type = spooldir
social_agent.sources.twitter_source.spoolDir = /home/user/data/incoming/tweets
social_agent.sources.twitter_source.fileHeader = true
social_agent.sources.twitter_source.fileSuffix = .COMPLETED
social_agent.sources.twitter_source.deletePolicy = immediate
social_agent.sources.twitter_source.batchSize = 1000
social_agent.sources.twitter_source.channels = mem_channel

# ── SOURCE 2: Thu thập reddit logs từ thư mục spool ──────────
social_agent.sources.reddit_source.type = spooldir
social_agent.sources.reddit_source.spoolDir = /home/user/data/incoming/reddit
social_agent.sources.reddit_source.fileHeader = true
social_agent.sources.reddit_source.fileSuffix = .COMPLETED
social_agent.sources.reddit_source.deletePolicy = immediate
social_agent.sources.reddit_source.batchSize = 500
social_agent.sources.reddit_source.channels = file_channel

# ── CHANNEL 1: Memory Channel (tốc độ cao, tweets) ───────────
social_agent.channels.mem_channel.type = memory
social_agent.channels.mem_channel.capacity = 100000
social_agent.channels.mem_channel.transactionCapacity = 5000

# ── CHANNEL 2: File Channel (an toàn hơn, reddit) ────────────
social_agent.channels.file_channel.type = file
social_agent.channels.file_channel.checkpointDir = /home/user/flume/checkpoint/reddit
social_agent.channels.file_channel.dataDirs = /home/user/flume/data/reddit
social_agent.channels.file_channel.capacity = 500000
social_agent.channels.file_channel.transactionCapacity = 1000

# ── SINK 1: Ghi tweets vào HDFS ──────────────────────────────
social_agent.sinks.hdfs_sink_tweets.type = hdfs
social_agent.sinks.hdfs_sink_tweets.channel = mem_channel
social_agent.sinks.hdfs_sink_tweets.hdfs.path = hdfs://localhost:8020/user/social_analytics/raw/tweets/%Y-%m-%d
social_agent.sinks.hdfs_sink_tweets.hdfs.filePrefix = tweets_
social_agent.sinks.hdfs_sink_tweets.hdfs.fileSuffix = .csv
social_agent.sinks.hdfs_sink_tweets.hdfs.fileType = DataStream
social_agent.sinks.hdfs_sink_tweets.hdfs.writeFormat = Text
social_agent.sinks.hdfs_sink_tweets.hdfs.rollInterval = 3600
social_agent.sinks.hdfs_sink_tweets.hdfs.rollSize = 134217728
social_agent.sinks.hdfs_sink_tweets.hdfs.rollCount = 0
social_agent.sinks.hdfs_sink_tweets.hdfs.batchSize = 1000
social_agent.sinks.hdfs_sink_tweets.hdfs.useLocalTimeStamp = true

# ── SINK 2: Ghi reddit logs vào HDFS ─────────────────────────
social_agent.sinks.hdfs_sink_reddit.type = hdfs
social_agent.sinks.hdfs_sink_reddit.channel = file_channel
social_agent.sinks.hdfs_sink_reddit.hdfs.path = hdfs://localhost:8020/user/social_analytics/raw/reddit_posts/%Y-%m-%d
social_agent.sinks.hdfs_sink_reddit.hdfs.filePrefix = reddit_
social_agent.sinks.hdfs_sink_reddit.hdfs.fileSuffix = .csv
social_agent.sinks.hdfs_sink_reddit.hdfs.fileType = DataStream
social_agent.sinks.hdfs_sink_reddit.hdfs.writeFormat = Text
social_agent.sinks.hdfs_sink_reddit.hdfs.rollInterval = 7200
social_agent.sinks.hdfs_sink_reddit.hdfs.rollSize = 134217728
social_agent.sinks.hdfs_sink_reddit.hdfs.rollCount = 0
social_agent.sinks.hdfs_sink_reddit.hdfs.batchSize = 500
social_agent.sinks.hdfs_sink_reddit.hdfs.useLocalTimeStamp = true
